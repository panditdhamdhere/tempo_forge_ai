name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tempoforge
          POSTGRES_PASSWORD: tempoforge
          POSTGRES_DB: tempoforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tempoforge -d tempoforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://tempoforge:tempoforge@localhost:5432/tempoforge
      APP_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @tempoforge/web lint
      - run: pnpm --filter @tempoforge/web typecheck
      - run: pnpm --filter @tempoforge/web build
