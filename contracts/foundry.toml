[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
ffi = false
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
tempo_testnet = "${TEMPO_TESTNET_RPC}"
tempo_mainnet = "${TEMPO_MAINNET_RPC}"

[etherscan]
# Placeholder for verification tooling when Tempo explorer verification is available.
