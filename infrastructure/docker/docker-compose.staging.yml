# Staging stack: Postgres, Redis, Qdrant, MinIO, API, Web
# Usage:
#   cp .env.staging.example .env.staging
#   # fill secrets
#   docker compose -f infrastructure/docker/docker-compose.staging.yml --env-file .env.staging up -d --build

name: tempoforge-staging

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tempoforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tempoforge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [internal]

  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    volumes:
      - qdrantdata:/qdrant/storage
    networks: [internal]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    networks: [internal]

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ../../.env.staging
    environment:
      APP_ENV: staging
      API_HOST: 0.0.0.0
      API_PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-tempoforge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tempoforge}
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT: http://minio:9000
      ALLOW_DEV_AUTH: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "${API_PUBLISH_PORT:-8080}:8080"
    networks: [internal]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/v1/health"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 45s

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_STRIPE_PRICE_PRO: ${NEXT_PUBLIC_STRIPE_PRICE_PRO:-}
        NEXT_PUBLIC_STRIPE_PRICE_TEAM: ${NEXT_PUBLIC_STRIPE_PRICE_TEAM:-}
    restart: unless-stopped
    environment:
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?set CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PUBLISH_PORT:-3000}:3000"
    networks: [internal]

networks:
  internal:

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  miniodata:
